# Test Configuration for VAS Module

# Jasypt 비활성화 (테스트 환경)
jasypt.encryptor.password=test-secret

# Security 비활성화
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration

# 프론트엔드 비활성화
operato.wms.spa.enabled=false

# Database - 실제 개발 DB 사용 (PostgreSQL)
# 개발 DB 정보 (프론트엔드 config.development.js와 동일)
spring.datasource.url=jdbc:postgresql://localhost:15432/britestone_3pl_dev
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=hatioLAB1008

# JPA Settings - 스키마 자동 생성하지 않음 (실제 DB 사용)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.operato.wms=DEBUG

# Test Data Initialization
# 실제 DB 데이터 활용 (test-data.sql 비활성화)
spring.sql.init.mode=never

# Transaction
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# DML 설정 (테스트 환경 - public 스키마 사용, 데이터는 domain_id=12)
dml.enabled=false
dml.domain=public
dbist.ddl.enable=false
dbist.base.entity.path=xyz.elidom,xyz.anythings,operato.wms
dbist.entity.validateBeforeSave=false
dbist.ddl.tablespace.data=pg_default
dbist.ddl.tablespace.idx=pg_default
dbist.ddl.integer.size=12
dbist.ddl.float.size=16,4

## Dbist AOP
sqlAspect.enabled=true
sqlAspect.prettyPrint=true
sqlAspect.combinedPrint=true
sqlAspect.includeElapsedTime=true

# Transaction Manager
transactionManager.defaultTimeout=3600

# Redis Server Connection Information
spring.data.redis.host=localhost
spring.data.redis.password=
spring.data.redis.port=6379
spring.data.redis.database=12
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.max-wait=-1
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.timeout=5000

redis.was.urls=localhost:9191

#############################################################
#						JACKSON-Serialization				#
#############################################################
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.INDENT_OUTPUT=true
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.default-property-inclusion=non-null
spring.jackson.time-zone=Asia/Seoul

#############################################################
#							Security						#
#############################################################
# Spring Security 6에서는 SecurityFilterChain 설정 클래스로 관리
# management.security.enabled / security.basic.enabled 는 제거됨
security.password.encoder.algorithm=SHA-256

#############################################################
#              Things Factory Auth config					#
#############################################################
factory.secret.key=0xD58F835B69D207A76CC5F84a70a1D0d4C79dAC95
factory.secret.accessTokenCookieKey=access_token.wmsapp
factory.secret.useVirtualHostBasedDomain=false
factory.secret.subdomainOffset=2

#############################################################
#							Middleware 						#
#############################################################
mq.module.use = false

mq.trace.use=false

#############################################################
#							Scheduler Use or Not			#
#############################################################
quartz.scheduler.enable=false
job.scheduler.enable=false
