# Jasypt Encryption
jasypt.encryptor.password=${JASYPT_ENCRYPTOR_PASSWORD:operato-wms-secret}

# Shutdown endpoint disabled by default (enable only in dev profile)
management.endpoint.shutdown.enabled=false

# ========================================
# 프론트엔드 통합 설정 (operato-wms-app)
# ========================================

# SPA (Single Page Application) 라우팅 지원
operato.wms.spa.enabled=true

# Static 리소스 설정
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.cachecontrol.max-age=31536000
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# 404 에러 발생 시 예외 throw (SpaController가 처리)
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
